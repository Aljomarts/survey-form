<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .options {
            margin-top: 10px;
        }

        .options label {
            display: block;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        textarea {
            resize: vertical;
        }

        .buttons {
            text-align: center;
            margin-top: 20px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        input[type="submit"] {
            background-color: #28a745;
            color: white;
        }

        input[type="submit"]:hover {
            background-color: #218838;
        }

        input[type="reset"] {
            background-color: #dc3545;
            color: white;
        }

        input[type="reset"]:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Customer Feedback Form</h2>

    <form id="feedbackForm">

        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="1" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label>How did you hear about us?</label>
        <div class="options">
            <label><input type="radio" name="source" value="Browser Search"> Browser Search</label>
            <label><input type="radio" name="source" value="Social Media"> Social Media</label>
            <label><input type="radio" name="source" value="Friend or Colleague"> Friend or Colleague</label>
            <label><input type="radio" name="source" value="Word of Mouth"> Word of Mouth</label>
            <label><input type="radio" name="source" value="Advertisements"> Advertisements</label>
            <label><input type="radio" name="source" value="Other" id="otherRadio"> Other: <input type="text" id="otherText" name="other_source" placeholder="Please specify"></label>
        </div>
        
        <style>
            #otherText {
                display: none;
                margin-left: 8px;
                width: 180px;
            }
        </style>

        <script>
        const radios = document.querySelectorAll('input[name="source"]');
        const otherRadio = document.getElementById('otherRadio');
        const otherText = document.getElementById('otherText');

        radios.forEach(radio => {
            radio.addEventListener('change', function () {
                if (otherRadio.checked) {
                    otherText.style.display = "inline-block";
                    otherText.focus();
                } else {
                    otherText.style.display = "none";
                    otherText.value = "";
                }
           });
        });
        </script>

        <label>Which services did you use? (Select all that apply)</label>
        <div class="options">
            <label><input type="checkbox" name="services[]" value="Customer Support"> Customer Support</label>
            <label><input type="checkbox" name="services[]" value="Online Shopping"> Online Shopping</label>
            <label><input type="checkbox" name="services[]" value="Delivery Service"> Delivery Service</label>
            <label><input type="checkbox" name="services[]" value="Technical Assistance"> Technical Assistance</label>
            <label><input type="checkbox" name="services[]" value="Other" id="serviceOther"> Other: <input type="text" id="serviceOtherText" name="other_service" placeholder="Please specify"></label>
        </div>

        <style>
        #serviceOtherText {
            display: none;
            margin-left: 8px;
            width: 180px;
       }
       </style>

       <script>
       const serviceOther = document.getElementById("serviceOther");
       const serviceOtherText = document.getElementById("serviceOtherText");

       serviceOther.addEventListener("change", function () {
           if (this.checked) {
               serviceOtherText.style.display = "inline-block";
               serviceOtherText.focus();
           } else {
               serviceOtherText.style.display = "none";
               serviceOtherText.value = "";
           }
      });
      </script>

        <label for="rating">Rate Your Experience</label>
        <select id="rating" name="rating" required>
            <option value="">-- Select Rating --</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Average">Average</option>
            <option value="Poor">Poor</option>
            <option value="Very Poor">Very Poor</option>
        </select>

        <label for="feedback">Additional Feedback</label>
        <textarea id="feedback" name="feedback" rows="5"
                  placeholder="Enter your comments, suggestions, or feedback here..."></textarea>

        <div class="buttons">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>

    </form>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOBi3QuBq-xM5PgA4dBmEFekO1vmXdaZC_sWItE9syB0TxLQ1K26a40d1UIwMt-NsDQA/exec";
  const form = document.getElementById('feedbackForm');

  form.addEventListener('submit', function(e) {
    e.preventDefault(); 

    const formData = new FormData(form);

    let referralSource = formData.get('source');
    if (referralSource === 'Other') {
        referralSource = formData.get('other_source') || 'Other Specified';
    }

    let selectedServices = formData.getAll('services[]');
    if (document.getElementById('serviceOther').checked) {
        selectedServices = selectedServices.filter(item => item !== 'Other');
        const customService = formData.get('other_service');
        if (customService) selectedServices.push(customService);
    }
    const finalServices = selectedServices.join(', ') || 'None Selected';

    const urlParams = new URLSearchParams();
    urlParams.append('name', formData.get('fullname'));
    urlParams.append('age', formData.get('age'));         // <-- Added missing field
    urlParams.append('email', formData.get('email'));     // <-- Added missing field
    urlParams.append('referral', referralSource);
    urlParams.append('service', finalServices);
    urlParams.append('experience', formData.get('rating'));
    urlParams.append('feedback', formData.get('feedback') || 'No comment');

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: urlParams.toString()
    })
    .then(() => {
      alert("Success! Form responses recorded securely inside your spreadsheet.");
      form.reset();
      document.getElementById('otherText').style.display = "none";
      document.getElementById('serviceOtherText').style.display = "none";
    })
    .catch(err => alert("Connection error occurred: " + err));
  });
</script>

</body>
</html>
